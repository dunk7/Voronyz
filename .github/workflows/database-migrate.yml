# Applies Prisma migrations to production when schema/migrations change on main.
# Requires repository secrets DATABASE_URL and DIRECT_DATABASE_URL (Supabase pooler + direct).
name: Database migrate (production)

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "web/prisma/**"
      - ".github/workflows/database-migrate.yml"

jobs:
  migrate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
        run: node scripts/migrate-deploy.mjs

[build]
  base = "web"
  # Run migrations in CI/CD only when DATABASE_URL is provided (production).
  # This ensures the Order table exists so paid checkouts can be persisted.
  command = "npx prisma generate && (test -n \"$DATABASE_URL\" && npx prisma migrate deploy || echo \"Skipping prisma migrate deploy (no DATABASE_URL)\") && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = "README.md,web/server.log,web/*.log"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL"

# Canonical host: apex only (add www CNAME → voronyz.netlify.app at your DNS provider first)
[[redirects]]
  from = "https://www.voronyz.com/*"
  to = "https://voronyz.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.voronyz.com/*"
  to = "https://voronyz.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/tinkercad/v4"
  to = "/tinkercad/v4.stl"
  status = 302

[[redirects]]
  from = "/tinkercad/voronyz-v4-top.stl"
  to = "/tinkercad/v4.stl"
  status = 302

# Serve STL from static CDN (avoid Next.js serverless cold starts on import)
[[redirects]]
  from = "/tinkercad/v4.stl"
  to = "/downloads/v4/v4.04t.stl"
  status = 200
  force = true

[[headers]]
  for = "/tinkercad/v4.stl"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "*"
    Cache-Control = "public, max-age=86400, immutable"
    Content-Type = "model/stl"
    Content-Disposition = "attachment; filename=\"v4.stl\""

[[headers]]
  for = "/v4stl"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "*"

[[headers]]
  for = "/v4.stl"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "*"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build]
  base = "web"
  # Run migrations in CI/CD only when DATABASE_URL is provided (production).
  # This ensures the Order table exists so paid checkouts can be persisted.
  command = "npx prisma generate && (test -n \"$DATABASE_URL\" && npx prisma migrate deploy || echo \"Skipping prisma migrate deploy (no DATABASE_URL)\") && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = "README.md,web/server.log,web/*.log"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL"

# Canonical host: apex only (add www CNAME → voronyz.netlify.app at your DNS provider first)
[[redirects]]
  from = "https://www.voronyz.com/*"
  to = "https://voronyz.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.voronyz.com/*"
  to = "https://voronyz.com/:splat"
  status = 301
  force = true

# Serve the STL as a static file (Tinkercad requires a .stl URL)
[[redirects]]
  from = "/v4stl"
  to = "/v4.stl"
  status = 302

[[headers]]
  for = "/v4.stl"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "*"

[[plugins]]
  package = "@netlify/plugin-nextjs"

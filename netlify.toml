[build]
  base = "web"
  # Migrations: GitHub Actions workflow database-migrate.yml (requires repo secrets), or locally:
  # cd web && npm run db:migrate
  # Do not run migrations during Netlify builds — Netlify cannot reach Supabase direct host (P1001).
  command = "npx prisma generate && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = "README.md,web/server.log,web/*.log"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL"
  # Temporary: disable voronyz.com/message until re-enabled (remove or set false).
  MESSAGE_DISABLED = "true"

# Canonical host: apex only (add www CNAME → voronyz.netlify.app at your DNS provider first)
[[redirects]]
  from = "https://www.voronyz.com/*"
  to = "https://voronyz.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "http://www.voronyz.com/*"
  to = "https://voronyz.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/uploads"
  to = "/upload"
  status = 301

[[redirects]]
  from = "/uploads/*"
  to = "/upload"
  status = 301

[[redirects]]
  from = "/tinkercad/v4"
  to = "/tinkercad/v4.stl"
  status = 302

[[redirects]]
  from = "/tinkercad/voronyz-v4-top.stl"
  to = "/tinkercad/v4.stl"
  status = 302

# Serve STL from static CDN (avoid Next.js serverless cold starts on import)
[[redirects]]
  from = "/tinkercad/v4.stl"
  to = "/downloads/v4/v4.04t.stl"
  status = 200
  force = true

[[headers]]
  for = "/tinkercad/v4.stl"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "*"
    Cache-Control = "public, max-age=86400, immutable"
    Content-Type = "model/stl"
    Content-Disposition = "attachment; filename=\"v4.stl\""

[[headers]]
  for = "/v4stl"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "*"

[[headers]]
  for = "/v4.stl"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, HEAD, OPTIONS"
    Access-Control-Allow-Headers = "*"

[[plugins]]
  package = "@netlify/plugin-nextjs"
